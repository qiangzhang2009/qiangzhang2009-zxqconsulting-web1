name = "zxqconsulting-api"
main = "api-worker.js"
compatibility_date = "2026-06-21"

# API routes for both zxqconsulting.com and www.zxqconsulting.com
[[routes]]
pattern = "zxqconsulting.com/api/*"
zone_name = "zxqconsulting.com"

[[routes]]
pattern = "www.zxqconsulting.com/api/*"
zone_name = "zxqconsulting.com"

[[d1_databases]]
binding = "zxqconsulting_comments"
database_name = "zxqconsulting-comments"
database_id = "84613a5c-a4f4-43a3-bd68-55d5ed95d48a"

# Supabase — set via: wrangler secret put SUPABASE_URL / SUPABASE_SERVICE_KEY
# (or uncomment and fill below for dev)
# [vars]
# SUPABASE_URL = "https://your-project.supabase.co"

# Daily seeder cron: run at 08:00 UTC every day
[triggers]
crons = ["0 8 * * *"]
