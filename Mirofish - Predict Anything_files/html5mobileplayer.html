        <script>
            var GetUrlValue = function (name) {
                var reg = new RegExp('(^|&)' + name + '=([^&]*)(&|$)', 'i');
                var r = window.location.search.substr(1).match(reg);
                if (r != null) {
                    try {
                        return decodeURIComponent(r[2]);
                    } catch (e) {
                        return null;
                    }
                }
                return null;
            };
            if (GetUrlValue('bvid')) {
                window.show_bv = 1;
            } else {
                window.show_bv = 0;
            }
            var hq = GetUrlValue('highQuality') == '1' || GetUrlValue('high_quality') == '1';
            var allow = true;
            if (window.top != window.self && window.REFERRER_LIST) {
                try {
                    var h = window.document.referrer.match(/^http(s)?:\/\/(.*?)\//);
                    if (
                        h &&
                        h[2] &&
                        !new RegExp(window.REFERRER_LIST.join('|').replace(/\./g, '\\.').replace(/\*/g, '\.\*')).test(
                            h[2],
                        )
                    ) {
                        allow = false;
                    } else if (
                        !window.document.referrer &&
                        window.navigator.userAgent.indexOf('MicroMessenger') === -1 &&
                        window.navigator.userAgent.indexOf('IqiyiApp') === -1
                    ) {
                        allow = false;
                    }
                } catch (e) {}
            }
            try {
                var i = window.document.referrer.match(/^http(s)?:\/\/(.*?)\//);
                if (i && i[2] && new RegExp('player\.bilibili\.com').test(i[2])) {
                    hq = false;
                }
                if (GetUrlValue('crossDomain')) {
                    -1 !== window.location.host.indexOf('.bilibili.com')
                        ? (document.domain = 'bilibili.com')
                        : -1 !== window.location.host.indexOf('.bilibili.co') && (document.domain = 'bilibili.co');
                }
            } catch (e) {}
            var hlsAllow = function () {
                if (window.navigator.userAgent.indexOf('Android') !== -1) {
                    return false;
                } else {
                    return true;
                }
            };
            var defaultSearch = function () {
                var config = {
                    aid: GetUrlValue('aid'),
                    cid: GetUrlValue('cid'),
                    bvid: GetUrlValue('bvid'),
                    quality: GetUrlValue('quality') || GetUrlValue('qn'),
                    portraitFullScreen:
                        GetUrlValue('portraitFullScreen') || GetUrlValue('portrait_full_screen') ? true : false,
                    page: GetUrlValue('p') || GetUrlValue('page') || 1,
                    p: GetUrlValue('p') || GetUrlValue('page') || 1,
                    type: GetUrlValue('type') || -1,
                    autoplay: GetUrlValue('autoplay') ? true : false,
                    episodeId: GetUrlValue('episodeId') || GetUrlValue('epid'),
                    seasonId: +GetUrlValue('seasonId') || +GetUrlValue('season_id'),
                    noRecommend: true,

                    highQuality: hq,
                    noFullScreenButton: GetUrlValue('noFullScreenButton') ? true : false,
                    spmid: GetUrlValue('spmid'),
                    fjw: GetUrlValue('fjw'),
                    t: GetUrlValue('t'),
                    dmid: GetUrlValue('dmid'),
                    outer: GetUrlValue('outer') !== '0',
                    hasMuteButton: GetUrlValue('hasMuteButton'),
                    hideCoverInfo: GetUrlValue('hideCoverInfo'),
                    hideDanmakuButton: GetUrlValue('hideDanmakuButton'),
                    autoplayMode: GetUrlValue('muted') ? 'muted' : null,
                    callAppMode: false,
                    useHls: hlsAllow(),
                    bsource: GetUrlValue('bsource'),
                    posterFirst: GetUrlValue('posterFirst'),
                    auto: GetUrlValue('auto') === 'true' ? true : false,
                    cooperate: GetUrlValue('cooperate') === 'true' ? true : false
                };

                    config.seasonType = GetUrlValue('seasonType') || GetUrlValue('season_type') || 1;
                }
                return config;

            if (allow) {

                var player = new BPlayerMobile(config);

                                wind.document.querySelectorAll('iframe').forEach(function (e) {
                                    try {

                                            var video = e.contentWindow.document.querySelector('video');
                                            if (hasPlay) {
                                                e.contentWindow.player.pause();

                                                hasPlay = true;
                                            }

                                                                ) {

                                                                        'video',
                                                                    );

                                                                    }
                                                                }
                                                            } catch (e) {}

                                                });
